version: "0.1"

project: "RISC-V CPU Bibliometric Analysis"

time_window: [2020, 2025]

language: "English"

fields:
  - title
  - abstract
  - keyword

doc_type:
  - article
  - review

query:

  object:
    - "RISC-V"
    - "RISC V"
    - "RISC-V ISA"
    - "RV32"
    - "RV64"

  method:
    - "processor"
    - "cpu"
    - "core"
    - "microarchitecture"
    - "instruction set architecture"

  context:
    - "computer architecture"
    - "system on chip"
    - "SoC"
    - "embedded system"
    - "hardware design"
    - "chip design"
    - "accelerator"

exclusion:
  - "quantum computing"
  - "biological neural network"

notes:
  description: "Expanded query for bibliometric analysis of RISC-V architecture and processors."
  database: "Web of Science / Scopus"